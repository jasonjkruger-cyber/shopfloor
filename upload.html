<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shop Floor — Upload</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #f0c040;
    --accent-dark: #c89e20;
    --radius: 14px;
    --font: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 24px 20px 40px;
    max-width: 460px;
    margin: 0 auto;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .logo span { color: var(--accent); }

  h1 {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 16px;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(240,192,64,0.05);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .upload-icon svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .upload-zone p {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .upload-zone small {
    font-size: 12px;
    color: var(--muted);
  }

  /* Preview */
  .preview-wrap {
    display: none;
    margin-bottom: 16px;
    position: relative;
  }

  .preview-wrap img {
    width: 100%;
    border-radius: var(--radius);
    display: block;
    max-height: 280px;
    object-fit: cover;
  }

  .preview-clear {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-clear svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

  /* Caption */
  .caption-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .submit-btn:hover { background: #f5ce60; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }

  .submit-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* States */
  .state-uploading, .state-success, .state-error { display: none; text-align: center; padding: 20px; }
  .state-uploading p, .state-error p { font-size: 14px; color: var(--muted); }
  .state-success .big-check { font-size: 48px; margin-bottom: 12px; }
  .state-success h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .state-success p { font-size: 14px; color: var(--muted); }
  .state-error p { color: #f08080; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .upload-again {
    margin-top: 16px;
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 24px;
    cursor: pointer;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>

<div class="logo">Shop Floor <span>●</span> Photo Board</div>

<div id="mainForm">
  <h1>Post a photo</h1>
  <p class="subtitle">Takes 5 seconds. No login needed.</p>

  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" capture="environment" id="fileInput" onchange="handleFile(this)">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <p>Tap to take or choose a photo</p>
    <small>JPG · PNG · HEIC</small>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" alt="Preview">
    <button class="preview-clear" onclick="clearPhoto()" aria-label="Remove photo">
      <svg viewBox="0 0 16 16"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
    </button>
  </div>

  <label class="caption-label" for="caption">Caption (optional)</label>
  <textarea id="caption" rows="2" placeholder="e.g. Line 3 setup complete, Station 7 issue..."></textarea>

  <button class="submit-btn" id="submitBtn" onclick="uploadPhoto()" disabled>
    <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    Post to display
  </button>
</div>

<div class="state-uploading" id="stateUploading">
  <div class="spinner"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <p>Uploading your photo…</p>
</div>

<div class="state-success" id="stateSuccess">
  <div class="big-check">✅</div>
  <h2>Posted!</h2>
  <p>Your photo is now live on the display.</p>
  <button class="upload-again" onclick="resetForm()">Post another photo</button>
</div>

<div class="state-error" id="stateError">
  <p id="errorMsg">Something went wrong. Please try again.</p>
  <button class="upload-again" onclick="showMain()">Try again</button>
</div>

<script>
  // ─── CONFIGURATION ───────────────────────────────────────────
  const CLOUD_NAME = 'dxofvx0ow';      // Replace with your Cloudinary cloud name
  const UPLOAD_PRESET = 'shopfloor_upload';  // Replace with your unsigned upload preset name
  // ─────────────────────────────────────────────────────────────

  let selectedFile = null;

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('uploadZone').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function clearPhoto() {
    selectedFile = null;
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('uploadZone').style.display = 'block';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('fileInput').value = '';
  }

  async function uploadPhoto() {
    if (!selectedFile) return;

    const caption = document.getElementById('caption').value.trim();
    const timestamp = new Date().toISOString();

    showState('uploading');

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('context', `caption=${caption || 'Shop floor photo'}|timestamp=${timestamp}`);
    formData.append('tags', 'shopfloor');

    const fill = document.getElementById('progressFill');
    let prog = 10;
    const interval = setInterval(() => { prog = Math.min(prog + 8, 85); fill.style.width = prog + '%'; }, 200);

    try {
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: 'POST',
        body: formData
      });

      clearInterval(interval);
      fill.style.width = '100%';

      if (!res.ok) throw new Error('Upload failed');
      showState('success');
    } catch (err) {
      clearInterval(interval);
      document.getElementById('errorMsg').textContent = 'Upload failed. Check your connection and try again.';
      showState('error');
    }
  }

  function showState(state) {
    document.getElementById('mainForm').style.display = state === 'main' ? 'block' : 'none';
    document.getElementById('stateUploading').style.display = state === 'uploading' ? 'block' : 'none';
    document.getElementById('stateSuccess').style.display = state === 'success' ? 'block' : 'none';
    document.getElementById('stateError').style.display = state === 'error' ? 'block' : 'none';
  }

  function showMain() { showState('main'); }

  function resetForm() {
    clearPhoto();
    document.getElementById('caption').value = '';
    showState('main');
  }
</script>
</body>
</html>
