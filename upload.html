<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shop Floor — Upload</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #f0c040;
    --accent-dark: #c89e20;
    --radius: 14px;
    --font: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 24px 20px 40px;
    max-width: 460px;
    margin: 0 auto;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .logo span { color: var(--accent); }

  h1 {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 16px;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(240,192,64,0.05);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .upload-icon svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .upload-zone p {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .upload-zone small {
    font-size: 12px;
    color: var(--muted);
  }

  /* Preview */
  .preview-wrap {
    display: none;
    margin-bottom: 16px;
    position: relative;
  }

  .preview-wrap img {
    width: 100%;
    border-radius: var(--radius);
    display: block;
    max-height: 280px;
    object-fit: cover;
  }

  .preview-clear {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-clear svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

  /* Caption */
  .caption-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .submit-btn:hover { background: #f5ce60; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }

  .submit-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* States */
  .state-uploading, .state-success, .state-error { display: none; text-align: center; padding: 20px; }
  .state-uploading p, .state-error p { font-size: 14px; color: var(--muted); }
  .state-success .big-check { font-size: 48px; margin-bottom: 12px; }
  .state-success h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .state-success p { font-size: 14px; color: var(--muted); }
  .state-error p { color: #f08080; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .upload-again {
    margin-top: 16px;
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 24px;
    cursor: pointer;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .preview-thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface2);
  }

  .preview-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .preview-thumb .remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .preview-thumb .remove-btn svg {
    width: 12px; height: 12px;
    stroke: #fff; fill: none;
    stroke-width: 2; stroke-linecap: round;
  }
</style>
</head>
<body>

<div class="logo">Shop Floor <span>●</span> Photo Board</div>

<div id="mainForm">
  <h1>Post photos</h1>
  <p class="subtitle">Select one or more — no login needed.</p>

  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" multiple id="fileInput" onchange="handleFiles(this)">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <p>Tap to choose photos</p>
    <small>Select multiple at once · JPG · PNG · HEIC</small>
  </div>

  <div class="preview-grid" id="previewGrid"></div>

  <label class="caption-label" for="caption">Caption for all photos (optional)</label>
  <textarea id="caption" rows="2" placeholder="e.g. Line 3 setup complete, Station 7 issue..."></textarea>

  <button class="submit-btn" id="submitBtn" onclick="uploadAllPhotos()" disabled>
    <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    <span id="submitLabel">Post to display</span>
  </button>
</div>

<div class="state-uploading" id="stateUploading">
  <div class="spinner"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <p id="uploadingMsg">Uploading photos…</p>
</div>

<div class="state-success" id="stateSuccess">
  <div class="big-check">✅</div>
  <h2>Posted!</h2>
  <p id="successMsg">Your photos are now live on the display.</p>
  <button class="upload-again" onclick="resetForm()">Post more photos</button>
</div>

<div class="state-error" id="stateError">
  <p id="errorMsg">Something went wrong. Please try again.</p>
  <button class="upload-again" onclick="showMain()">Try again</button>
</div>

<script>
  // ─── CONFIGURATION ───────────────────────────────────────────
  const CLOUD_NAME = 'dxofvx0ow';      // Replace with your Cloudinary cloud name
  const UPLOAD_PRESET = 'shopfloor_upload';  // Replace with your unsigned upload preset name
  // ─────────────────────────────────────────────────────────────

  let selectedFiles = [];

  function handleFiles(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    selectedFiles = selectedFiles.concat(files);
    renderPreviews();
    document.getElementById('uploadZone').style.display = selectedFiles.length ? 'none' : 'block';
    document.getElementById('submitBtn').disabled = false;
    updateSubmitLabel();
  }

  function renderPreviews() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = '';
    selectedFiles.forEach((file, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'preview-thumb';
      const img = document.createElement('img');
      img.alt = 'Preview';
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
      const btn = document.createElement('button');
      btn.className = 'remove-btn';
      btn.innerHTML = '<svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>';
      btn.onclick = () => removeFile(i);
      thumb.appendChild(img);
      thumb.appendChild(btn);
      grid.appendChild(thumb);
    });
    // Show add more button if files selected
    if (selectedFiles.length > 0) {
      const addMore = document.createElement('div');
      addMore.className = 'preview-thumb';
      addMore.style.cssText = 'display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px dashed rgba(255,255,255,0.2);background:transparent;';
      addMore.innerHTML = '<svg viewBox="0 0 24 24" style="width:28px;height:28px;stroke:#888;fill:none;stroke-width:1.8;stroke-linecap:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
      addMore.onclick = () => document.getElementById('fileInput').click();
      grid.appendChild(addMore);
    }
  }

  function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderPreviews();
    if (selectedFiles.length === 0) {
      document.getElementById('uploadZone').style.display = 'block';
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('fileInput').value = '';
    }
    updateSubmitLabel();
  }

  function updateSubmitLabel() {
    const n = selectedFiles.length;
    document.getElementById('submitLabel').textContent = n > 1 ? `Post ${n} photos to display` : 'Post to display';
  }

  async function uploadAllPhotos() {
    if (!selectedFiles.length) return;
    const caption = document.getElementById('caption').value.trim();
    const timestamp = new Date().toISOString();
    const total = selectedFiles.length;
    let done = 0;
    let failed = 0;

    showState('uploading');
    document.getElementById('uploadingMsg').textContent = `Uploading 1 of ${total}…`;
    const fill = document.getElementById('progressFill');
    fill.style.width = '0%';

    for (const file of selectedFiles) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);
      formData.append('context', `caption=${caption || 'Shop floor photo'}|timestamp=${timestamp}`);
      formData.append('tags', 'shopfloor');
      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: 'POST', body: formData
        });
        if (!res.ok) failed++;
      } catch { failed++; }
      done++;
      fill.style.width = Math.round((done / total) * 100) + '%';
      document.getElementById('uploadingMsg').textContent = done < total ? `Uploading ${done + 1} of ${total}…` : 'Finishing up…';
    }

    if (failed === total) {
      document.getElementById('errorMsg').textContent = 'All uploads failed. Check your connection and try again.';
      showState('error');
    } else {
      const n = total - failed;
      document.getElementById('successMsg').textContent = failed > 0
        ? `${n} of ${total} photos posted. ${failed} failed.`
        : n === 1 ? 'Your photo is now live on the display.' : `All ${n} photos are now live on the display.`;
      showState('success');
    }
  }

  function showState(state) {
    document.getElementById('mainForm').style.display = state === 'main' ? 'block' : 'none';
    document.getElementById('stateUploading').style.display = state === 'uploading' ? 'block' : 'none';
    document.getElementById('stateSuccess').style.display = state === 'success' ? 'block' : 'none';
    document.getElementById('stateError').style.display = state === 'error' ? 'block' : 'none';
  }

  function showMain() { showState('main'); }

  function resetForm() {
    selectedFiles = [];
    document.getElementById('previewGrid').innerHTML = '';
    document.getElementById('uploadZone').style.display = 'block';
    document.getElementById('caption').value = '';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('fileInput').value = '';
    showState('main');
  }
</script>
</body>
</html>
