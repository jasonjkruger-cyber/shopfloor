<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Floor Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f0;
    --muted: rgba(255,255,255,0.45);
    --accent: #f0c040;
    --font: 'DM Sans', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
    overflow: hidden;
  }

  /* Main layout */
  #app {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
  }

  /* Slide area */
  #slideArea {
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .slide.active { opacity: 1; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Caption overlay */
  .caption-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 60px 48px 32px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
  }

  .caption-text {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .caption-meta {
    font-size: 15px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .caption-meta .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
  }

  /* Bottom bar */
  #bottomBar {
    height: 80px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 24px;
  }

  .bar-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: auto;
  }

  .bar-logo span { color: var(--accent); }

  .counter {
    font-size: 15px;
    color: var(--muted);
    min-width: 70px;
    text-align: center;
  }

  .nav-btn {
    width: 48px; height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    color: var(--text);
  }

  .nav-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .refresh-btn {
    width: 48px; height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    color: var(--text);
    margin-left: 8px;
  }

  .refresh-btn:hover { background: rgba(255,255,255,0.12); }
  .refresh-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .refresh-btn.spinning svg { animation: spin 1s linear; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }

  .live-label {
    font-size: 13px;
    color: var(--muted);
    margin-right: auto;
  }

  /* Empty state */
  #emptyState {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
  }

  #emptyState svg { width: 64px; height: 64px; stroke: var(--muted); fill: none; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
  #emptyState h2 { font-size: 22px; font-weight: 500; color: var(--muted); }
  #emptyState p { font-size: 15px; }

  /* New photo toast */
  #toast {
    position: fixed;
    top: 24px; right: 24px;
    background: var(--accent);
    color: #111;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    transform: translateY(-80px);
    transition: transform 0.3s ease;
    z-index: 100;
  }

  #toast.show { transform: translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div id="slideArea">
    <div id="emptyState">
      <svg viewBox="0 0 64 64"><rect x="8" y="8" width="48" height="48" rx="6"/><circle cx="22" cy="24" r="5"/><polyline points="56 44 42 28 14 56"/></svg>
      <h2>Waiting for photos…</h2>
      <p>Staff can post from the Upload page</p>
    </div>
  </div>

  <div id="bottomBar">
    <div class="bar-logo">Shop Floor <span>●</span> Photo Board</div>
    <div class="live-dot"></div>
    <span class="live-label">Auto-refresh every 30s</span>
    <span class="counter" id="counter">— / —</span>
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled aria-label="Previous photo">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" disabled aria-label="Next photo">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchPhotos(true)" aria-label="Refresh now">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
</div>

<div id="toast">📸 New photo posted!</div>

<script>
  // ─── CONFIGURATION ───────────────────────────────────────────
  const CLOUD_NAME = 'dxofvx0ow';
  const REFRESH_INTERVAL = 30000;
  // Enable "Resource list" in Cloudinary: Settings > Security > Restricted media types > uncheck "Resource list" 
  // ─────────────────────────────────────────────────────────────

  let photos = [];
  let currentIndex = 0;
  let prevCount = 0;

  async function fetchPhotos(manual = false) {
    if (manual) {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');
      setTimeout(() => btn.classList.remove('spinning'), 1000);
    }

    try {
      // Use Cloudinary Admin API search via unsigned fetch with tag filter
      const res = await fetch(
        `https://res.cloudinary.com/${CLOUD_NAME}/image/list/shopfloor.json?_=${Date.now()}`,
        { cache: 'no-store' }
      );

      let newPhotos = [];

      if (res.ok) {
        const data = await res.json();
        newPhotos = (data.resources || [])
          .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
          .map(r => ({
            url: `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto,w_1920/${r.public_id}`,
            caption: r.context?.custom?.caption || 'Shop floor photo',
            time: new Date(r.created_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
          }));
      } else {
        // Fallback: try fetching recent uploads via search API
        const searchRes = await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/resources/search`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              expression: 'tags=shopfloor',
              sort_by: [{ created_at: 'desc' }],
              max_results: 50,
              with_field: ['context', 'tags']
            })
          }
        );
        if (searchRes.ok) {
          const searchData = await searchRes.json();
          newPhotos = (searchData.resources || []).map(r => ({
            url: `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto,w_1920/${r.public_id}`,
            caption: r.context?.custom?.caption || 'Shop floor photo',
            time: new Date(r.created_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
          }));
        }
      }

      const hadNew = newPhotos.length > prevCount && prevCount > 0;
      prevCount = newPhotos.length;
      photos = newPhotos;

      renderSlides();
      if (hadNew) showToast();
    } catch (e) {
      console.error('Failed to fetch photos', e);
    }
  }

  function renderSlides() {
    const area = document.getElementById('slideArea');
    area.querySelectorAll('.slide').forEach(s => s.remove());

    const empty = document.getElementById('emptyState');
    empty.style.display = photos.length ? 'none' : 'flex';

    photos.forEach((p, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === currentIndex ? ' active' : '');
      slide.innerHTML = `
        <img src="${p.url}" alt="${p.caption}" loading="lazy">
        <div class="caption-overlay">
          <div class="caption-text">${p.caption}</div>
          <div class="caption-meta">
            <span>${p.time}</span>
          </div>
        </div>
      `;
      area.appendChild(slide);
    });

    updateControls();
  }

  function updateControls() {
    const n = photos.length;
    document.getElementById('counter').textContent = n ? `${currentIndex + 1} / ${n}` : '— / —';
    document.getElementById('prevBtn').disabled = currentIndex === 0 || n === 0;
    document.getElementById('nextBtn').disabled = currentIndex >= n - 1 || n === 0;
  }

  function navigate(dir) {
    currentIndex = Math.max(0, Math.min(photos.length - 1, currentIndex + dir));
    document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === currentIndex));
    updateControls();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'r' || e.key === 'R') fetchPhotos(true);
  });

  // Initial load + auto-refresh
  fetchPhotos();
  setInterval(fetchPhotos, REFRESH_INTERVAL);
</script>
</body>
</html>
